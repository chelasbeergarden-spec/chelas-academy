<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Chela's Academy</title>
<style>
  :root{
    --header:#2f6b66; --tabs:#3a7d77; --bg:#f4f4f2; --card:#ffffff; --border:#e2e2de;
    --text:#22302e; --muted:#6b7a77; --accent:#e0a53a; --accent2:#c98a1f;
    --good:#2f9e63; --bad:#d94f3d; --radius:14px;
    --cat-menu:#c9922c; --cat-bebidas:#2f7fb0; --cat-servicio:#3a7d77; --cat-alcohol:#c0483a; --cat-practico:#4c8a4c; --cat-alergias:#b0552f;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 60px}
  header.top{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--header);color:#fff}
  header.top h1{font-size:19px;margin:0;letter-spacing:.3px;font-weight:800}
  header.top h1 span{color:var(--accent)}
  .header-right{display:flex;gap:10px;align-items:center}
  .user-chip{font-size:13px;color:#dff1ee;font-weight:600}
  .btn{background:var(--accent);color:#241a08;border:none;border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer;font-size:14px}
  .btn:hover{background:var(--accent2)}
  .btn.secondary{background:#fff;color:var(--text);border:1px solid var(--border)}
  .btn.ghost{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}
  .btn.small{padding:6px 10px;font-size:12px}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  input{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:#fff;color:var(--text);font-size:15px}
  label{font-size:13px;color:var(--muted);display:block;margin:14px 0 6px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .hidden{display:none !important}
  .lang-toggle{display:flex;border:1px solid rgba(255,255,255,.35);border-radius:10px;overflow:hidden}
  .lang-toggle button{background:transparent;color:#eaf5f3;border:none;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer}
  .lang-toggle button.active{background:var(--accent);color:#241a08}
  .ring{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;background:#fff;border:3px solid var(--border)}

  /* Tabs (tracks) */
  .tabs{display:flex;background:var(--tabs);overflow-x:auto;white-space:nowrap}
  .tabs button{background:transparent;border:none;color:#d9ece9;padding:14px 18px;font-weight:700;font-size:14.5px;cursor:pointer;border-bottom:3px solid transparent}
  .tabs button .cnt{font-weight:600;opacity:.85;font-size:12.5px}
  .tabs button.active{color:#fff;border-bottom-color:var(--accent)}

  .login-wrap{max-width:420px;margin:60px auto 0}

  /* Search + filters */
  .search-row{margin:16px 0 10px}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .filter-pill{background:#fff;border:1px solid var(--border);color:var(--text);border-radius:20px;padding:8px 16px;font-size:13.5px;font-weight:600;cursor:pointer}
  .filter-pill.active{background:var(--header);color:#fff;border-color:var(--header)}
  .track-summary{background:#eef4f3;border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13.5px;color:var(--text);margin-bottom:14px;font-weight:600}

  .cat-badge{display:inline-block;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;color:#fff;text-transform:uppercase;letter-spacing:.3px}
  .cat-badge.Menú{background:var(--cat-menu)}
  .cat-badge.Bebidas{background:var(--cat-bebidas)}
  .cat-badge.Servicio{background:var(--cat-servicio)}
  .cat-badge.Alcohol{background:var(--cat-alcohol)}
  .cat-badge.Práctico{background:var(--cat-practico)}
  .cat-badge.Alergias{background:var(--cat-alergias)}

  .module-card{display:flex;align-items:center;gap:14px;padding:16px 18px;border:1px solid var(--border);border-radius:12px;margin-bottom:12px;background:var(--card);cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .module-card.locked{opacity:.55;cursor:not-allowed}
  .module-card .icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
  .module-card .icon.done{background:var(--good);color:#fff}
  .module-card .icon.locked{background:#e6e6e2;color:#9aa3a1}
  .module-card .icon.open{background:var(--header);color:#fff}
  .module-card .info{flex:1;min-width:0}
  .module-card .info .idline{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px}
  .module-card .info .t{font-weight:700;font-size:15.5px;margin-bottom:3px}
  .module-card .info .s{font-size:12.5px;color:var(--muted)}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:#f4e3c4;color:#8a5a12;margin-left:6px}
  .pill.crit{background:#f5d8d2;color:#a1341f}

  .lesson-box{background:#fbfbf9;border:1px solid var(--border);border-radius:12px;padding:20px;font-size:15.5px;line-height:1.7;min-height:120px;white-space:pre-line}
  .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:10px}
  .dots{display:flex;gap:6px;justify-content:center;margin:14px 0}
  .dots span{width:7px;height:7px;border-radius:50%;background:var(--border)}
  .dots span.active{background:var(--accent)}
  .q-block{margin-bottom:20px}
  .q-title{font-weight:700;margin-bottom:10px;font-size:15px}
  .opt{display:block;width:100%;text-align:left;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:#fbfbf9;color:var(--text);margin-bottom:8px;cursor:pointer;font-size:14.5px}
  .opt.selected{border-color:var(--accent);background:#fbeed2}
  .opt.correct{border-color:var(--good);background:#e2f5e9}
  .opt.wrong{border-color:var(--bad);background:#fbe4e0}
  /* ─── FLASHCARD 3D FLIP ─── */
  .flash-scene{perspective:1200px;margin-bottom:10px;border-radius:14px}
  .flash-inner{
    position:relative;width:100%;min-height:220px;
    transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);
    cursor:pointer;border-radius:14px
  }
  .flash-inner.flipped{transform:rotateY(180deg)}
  .flash-face{
    position:absolute;inset:0;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;border-radius:14px;padding:24px 20px;border:1px solid var(--border)
  }
  .flash-front{background:#fff}
  .flash-back{background:var(--header);color:#fff;transform:rotateY(180deg)}
  .flash-img{max-width:100%;max-height:150px;object-fit:contain;border-radius:10px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.10)}
  .flash-label{font-size:17px;font-weight:700;line-height:1.4}
  .flash-counter{text-align:center;font-size:13px;color:var(--muted);font-weight:700;margin-bottom:8px;letter-spacing:.2px}
  .flash-hint{text-align:center;font-size:12px;color:var(--muted);margin-top:10px;opacity:.7}

  /* ─── QUIZ IMPROVEMENTS ─── */
  @keyframes pulse-correct{0%,100%{transform:scale(1)}50%{transform:scale(1.025)}}
  @keyframes shake-wrong{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  .opt.correct{animation:pulse-correct .4s ease;animation-fill-mode:both}
  .opt.wrong{animation:shake-wrong .4s ease}
  .quiz-score-ring{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:26px;margin:0 auto 14px;border:4px solid}
  .quiz-score-ring.passed{border-color:var(--good);color:var(--good);background:#e8f7ee}
  .quiz-score-ring.failed{border-color:var(--bad);color:var(--bad);background:#fdecea}
  .missed-list{text-align:left;margin:16px 0 4px}
  .missed-item{padding:10px 13px;border-radius:10px;background:#fffbf2;border:1px solid #f0ddb0;margin-bottom:8px;font-size:13.5px}
  .missed-item .mi-q{font-weight:700;margin-bottom:4px;color:var(--text)}
  .missed-item .mi-a{color:var(--good);font-size:13px}
  .missed-title{font-size:13px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:8px;border-bottom:1px solid var(--border);text-align:left}
  th{color:var(--muted);font-weight:700}
  .muted{color:var(--muted);font-size:13px}
  .center{text-align:center}

  /* Onboarding */
  .onb-add{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .onb-add input, .onb-add select{width:auto;flex:1;min-width:140px}
  .onb-candidate{border:1px solid var(--border);border-radius:12px;margin-bottom:12px;background:var(--card);overflow:hidden}
  .onb-cand-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
  .onb-cand-head .info{flex:1;min-width:0}
  .onb-cand-head .name{font-weight:700;font-size:15px}
  .onb-cand-head .meta{font-size:12.5px;color:var(--muted)}
  .onb-bar-wrap{width:90px;height:8px;border-radius:20px;background:#e6e6e2;overflow:hidden;flex-shrink:0}
  .onb-bar{height:100%;background:var(--good)}
  .onb-pct{font-size:12px;font-weight:700;color:var(--muted);width:34px;text-align:right;flex-shrink:0}
  .onb-remove{background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px;flex-shrink:0}
  .onb-phases{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
  .onb-candidate.open .onb-phases{display:block}
  .onb-phase{margin-top:14px}
  .onb-phase-title{font-weight:700;font-size:13.5px;color:var(--header);margin-bottom:8px}
  .onb-item{display:flex;align-items:flex-start;gap:9px;font-size:13.5px;margin-bottom:7px;cursor:pointer}
  .onb-item input{width:16px;height:16px;margin-top:2px;flex-shrink:0;cursor:pointer}
  .onb-item.checked span{color:var(--muted);text-decoration:line-through}

  .policy-check{display:flex;align-items:flex-start;gap:11px;padding:16px 18px;border:1px solid var(--border);border-radius:12px;background:#fbfbf9;cursor:pointer;font-size:15px;line-height:1.5}
  .policy-check input{width:18px;height:18px;margin-top:2px;flex-shrink:0;cursor:pointer}

  /* ─── ADMIN PANEL ─── */
  .admin-pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.68);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
  .admin-pin-box{background:#fff;border-radius:20px;padding:36px 28px;max-width:340px;width:100%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.28)}
  .admin-pin-box .lock-icon{font-size:38px;margin-bottom:10px}
  .admin-pin-box h2{margin:0 0 6px;font-size:20px;color:var(--header)}
  .admin-pin-box .sub{color:var(--muted);margin:0 0 20px;font-size:13.5px}
  .pin-field{width:100%;text-align:center;font-size:20px;letter-spacing:6px;padding:13px 14px;border-radius:12px;border:2px solid var(--border);outline:none;background:#f7f8f7;margin-bottom:12px;font-family:monospace}
  .pin-field:focus{border-color:var(--header)}
  .pin-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;background:#f0f0ec;border:1px solid var(--border);border-radius:8px;padding:3px 9px;color:var(--muted);font-family:monospace;font-weight:700}
  .pin-badge.set{color:var(--header);background:#eef4f3;border-color:#b8d6d3}
  .pin-change-form{margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .pin-change-form input{max-width:110px;text-align:center;font-family:monospace;letter-spacing:4px;font-size:16px;padding:6px 10px}
  .login-pin-step{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
  .admin-header-row{display:flex;align-items:center;justify-content:space-between;margin:16px 0 6px}
  .admin-header-row h2{margin:0;font-size:18px;color:var(--header)}
  .admin-tab-bar{display:flex;border-bottom:2px solid var(--border);margin:0 -18px 20px;padding:0 18px;overflow-x:auto}
  .admin-tab{background:none;border:none;border-bottom:3px solid transparent;padding:11px 16px;font-weight:700;font-size:13.5px;color:var(--muted);cursor:pointer;margin-bottom:-2px;white-space:nowrap}
  .admin-tab.active{color:var(--header);border-bottom-color:var(--header)}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:20px}
  .stat-box{background:#eef4f3;border-radius:12px;padding:14px 10px;text-align:center}
  .stat-box .sv{font-size:26px;font-weight:800;color:var(--header);line-height:1.1}
  .stat-box .sl{font-size:11px;color:var(--muted);font-weight:700;margin-top:4px;text-transform:uppercase;letter-spacing:.4px}
  .roster-card{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;border:1px solid var(--border);border-radius:12px;margin-bottom:10px;background:#fff}
  .rav{width:40px;height:40px;border-radius:50%;background:var(--header);color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
  .roster-card .ri{flex:1;min-width:0}
  .roster-card .rn{font-weight:700;font-size:14.5px;margin-bottom:2px}
  .roster-card .rm{font-size:12px;color:var(--muted)}
  .role-tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;background:#e4f0ee;color:var(--header);margin-left:5px}
  .add-form{background:#f0f5f4;border:1px solid #cce0dc;border-radius:12px;padding:16px;margin-bottom:20px}
  .add-form h3{margin:0 0 12px;font-size:14px;color:var(--header);font-weight:700}
  .add-form .form-row{display:flex;gap:8px;flex-wrap:wrap}
  .add-form .form-row input,.add-form .form-row select{flex:1;min-width:130px}
  .prog-bar-wrap{display:inline-block;width:90px;height:6px;background:#e0e6e4;border-radius:20px;overflow:hidden;vertical-align:middle;margin-right:6px}
  .prog-bar{height:100%;background:var(--good);border-radius:20px}
  .edit-inline{background:#f4f7f6;border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:10px;display:none}
  .edit-inline.show{display:block}
  .edit-inline .form-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
  .edit-inline .form-row input,.edit-inline .form-row select{flex:1;min-width:120px}
  .del-confirm{background:#fdecea;border:1px solid #f5c4bf;border-radius:8px;padding:10px 12px;margin-top:8px;font-size:13px;display:none;align-items:center;justify-content:space-between;gap:8px}
  .del-confirm.show{display:flex}
</style>
</head>
<body>

<header class="top">
  <h1>Chela's <span>Training</span></h1>
  <div class="header-right">
    <span class="user-chip hidden" id="header-username"></span>
    <div class="lang-toggle">
      <button id="btn-lang-es">ES</button><button id="btn-lang-en">EN</button>
    </div>
    <button class="btn ghost small hidden" id="btn-go-admin" data-t-en="Progress" data-t-es="Progreso">Progreso</button>
    <button class="btn ghost small hidden" id="btn-go-onboarding" data-t-en="Onboarding" data-t-es="Onboarding">Onboarding</button>
    <button class="btn ghost small hidden" id="btn-logout" data-t-en="Log out" data-t-es="Salir">Salir</button>
    <button class="btn ghost small" id="btn-open-admin-panel" title="Admin Panel" style="padding:7px 9px;font-size:15px">⚙</button>
  </div>
</header>

<div class="tabs hidden" id="track-tabs"></div>

<div class="wrap">

  <!-- LOGIN -->
  <div id="view-login" class="hidden">
    <div class="card login-wrap">
      <h2 data-t-en="Sign in" data-t-es="Iniciar sesión">Iniciar sesión</h2>
      <label data-t-en="Work email" data-t-es="Correo de trabajo">Correo de trabajo</label>
      <input id="login-email" type="email" placeholder="nombre@chelas.com" autocomplete="email">
      <p class="muted" id="login-error" style="color:var(--bad);display:none;margin-top:10px"></p>
      <button class="btn" id="btn-login" style="margin-top:18px;width:100%" data-t-en="Continue" data-t-es="Continuar">Continuar</button>

      <!-- Paso 2: PIN (se muestra solo si el usuario tiene PIN asignado) -->
      <div id="login-pin-step" class="login-pin-step hidden">
        <label data-t-en="4-digit PIN" data-t-es="PIN de 4 dígitos">PIN de 4 dígitos</label>
        <input type="password" id="login-pin" class="pin-field" placeholder="••••" maxlength="4" autocomplete="off" inputmode="numeric">
        <p id="login-pin-error" style="color:var(--bad);display:none;margin-top:0;margin-bottom:12px;font-size:13px">PIN incorrecto. Inténtalo de nuevo.</p>
        <button class="btn" id="btn-login-pin" style="width:100%;margin-bottom:10px" data-t-en="Enter" data-t-es="Entrar">Entrar</button>
        <button class="btn secondary" id="btn-login-back" style="width:100%" data-t-en="← Back" data-t-es="← Volver">← Volver</button>
      </div>

      <p class="muted" style="margin-top:14px" data-t-en="Your role is assigned by your manager. If your email isn't recognized, ask them to add you." data-t-es="Tu rol lo asigna tu manager. Si tu correo no es reconocido, pídele que te agregue.">—</p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="view-dashboard" class="hidden">
    <div class="card" style="display:flex;align-items:center;gap:16px;margin-top:16px">
      <div class="ring" id="progress-ring">0%</div>
      <div>
        <div style="font-weight:800;font-size:16px" id="dash-name"></div>
        <div class="muted" id="dash-role"></div>
      </div>
    </div>

    <div class="search-row">
      <input id="search-input" data-t-en-ph="Search module…" data-t-es-ph="Buscar módulo…" placeholder="Buscar módulo…">
    </div>
    <div class="filters" id="filter-pills"></div>
    <div class="track-summary" id="track-summary"></div>
    <div id="module-list"></div>
  </div>

  <!-- MODULE (lessons / flashcards / quiz) -->
  <div id="view-module" class="hidden">
    <button class="btn secondary small" id="btn-back-dash" style="margin-top:16px" data-t-en="← Back" data-t-es="← Volver">← Volver</button>
    <div class="card" style="margin-top:12px">
      <h2 id="mod-title" style="margin-top:0"></h2>

      <div id="mod-lessons">
        <div class="lesson-box" id="lesson-text"></div>
        <div class="dots" id="lesson-dots"></div>
        <div class="nav-row">
          <button class="btn secondary" id="btn-lesson-prev" data-t-en="Previous" data-t-es="Anterior">Anterior</button>
          <button class="btn" id="btn-lesson-next" data-t-en="Next" data-t-es="Siguiente">Siguiente</button>
        </div>
      </div>

      <div id="mod-flash" class="hidden">
        <div class="flash-counter" id="flash-counter"></div>
        <div class="flash-scene">
          <div class="flash-inner" id="flash-inner">
            <div class="flash-face flash-front" id="flash-front"></div>
            <div class="flash-face flash-back" id="flash-back"></div>
          </div>
        </div>
        <div class="flash-hint" id="flash-hint"></div>
        <div class="dots" id="flash-dots"></div>
        <div class="nav-row">
          <button class="btn secondary" id="btn-flash-prev" data-t-en="Previous" data-t-es="Anterior">Anterior</button>
          <button class="btn" id="btn-flash-next" data-t-en="Take the quiz" data-t-es="Ir al examen">Ir al examen</button>
        </div>
      </div>

      <div id="mod-quiz" class="hidden">
        <p class="muted" id="quiz-pass-note"></p>
        <div id="quiz-body"></div>
        <button class="btn" id="btn-quiz-submit" style="width:100%" data-t-en="Check answers" data-t-es="Revisar respuestas">Revisar respuestas</button>
        <div id="quiz-result" class="hidden" style="margin-top:14px;text-align:center"></div>
      </div>

      <div id="mod-policy" class="hidden">
        <label class="policy-check">
          <input type="checkbox" id="policy-checkbox">
          <span data-t-en="I have read and understood these company policies." data-t-es="He leído y entiendo estas políticas de la empresa.">He leído y entiendo estas políticas de la empresa.</span>
        </label>
        <button class="btn" id="btn-policy-confirm" style="width:100%;margin-top:14px" disabled data-t-en="Confirm" data-t-es="Confirmar">Confirmar</button>
        <div id="policy-result" class="hidden" style="margin-top:14px;text-align:center"></div>
      </div>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="view-admin" class="hidden">
    <button class="btn secondary small" id="btn-back-dash2" style="margin-top:16px" data-t-en="← Back" data-t-es="← Volver">← Volver</button>

<script src="modules.js"></script>
<script>
/* ================= Config ================= */
const REPORT_URL = "https://script.google.com/macros/s/AKfycbw-wzlDSi_ErKPzxc3Ek_C5XTuGux3KUCx9su4I3FZTAR-FjjUlhQnSFHbUO1rYT-IVPw/exec";

const ROLE_TRACK = { Server:"SERVER", Bartender:"BARTENDER", Busser:"BUSSER", Host:"HOST", Kitchen:"KITCHEN", Manager:"MANAGER" };
const ALL_TRACKS = ["CORE", "SERVER", "BARTENDER", "BUSSER", "HOST", "KITCHEN", "MANAGER"];
const TRACK_LABEL = { CORE: { en: "Core", es: "Core" }, SERVER: { en: "Server", es: "Server" }, BARTENDER: { en: "Bartender", es: "Bartender" }, BUSSER: { en: "Busser", es: "Busser" }, HOST: { en: "Host", es: "Host" }, KITCHEN: { en: "Kitchen", es: "Cocina" }, MANAGER: { en: "Manager", es: "Manager" } };

// Normalizes a role string from the Roster (any casing/spacing) to the exact
// canonical value the app expects (e.g. "manager" / " MANAGER " -> "Manager").
// Returns null if it doesn't match any known role.
function normalizeRole(rawRole){
  if(!rawRole) return null;
  const target = rawRole.trim().toLowerCase();
  const known = Object.keys(ROLE_TRACK); // Server, Bartender, Busser, Host, Manager
  const match = known.find(r => r.toLowerCase() === target);
  return match || null;
}

/* ================= State ================= */
let lang = localStorage.getItem("chelas_lang") || "es";
let currentUser = null;   // { name, email, role }
let userTracks = [];      // tracks this user can see as tabs
let activeTrack = "CORE";
let activeFilter = "Todos";
let searchQuery = "";
let activeModule = null;
let lessonIdx = 0, flashIdx = 0;
let quizAnswers = {};

/* ================= Helpers ================= */
const $ = (id) => document.getElementById(id);
const t = (obj) => obj[lang] || obj.en || "";

function loadUsers(){ return JSON.parse(localStorage.getItem("chelas_users") || "{}"); }
function saveUsers(u){ localStorage.setItem("chelas_users", JSON.stringify(u)); }

function getUserRecord(email){
  const users = loadUsers();
  return users[email.toLowerCase()];
}
function upsertUserRecord(email, name, role){
  const users = loadUsers();
  const key = email.toLowerCase();
  if(!users[key]) users[key] = { email: key, name, role, progress: {}, updated: new Date().toISOString() };
  else { users[key].name = name; users[key].role = role; }
  saveUsers(users);
  return users[key];
}
function saveProgress(email, moduleId, passed, score, critical){
  const users = loadUsers();
  const key = email.toLowerCase();
  if(!users[key]) return;
  users[key].progress[moduleId] = { passed, score, critical, date: new Date().toISOString() };
  users[key].updated = new Date().toISOString();
  saveUsers(users);
  if(REPORT_URL){
    fetch(REPORT_URL, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: key, name: users[key].name, role: users[key].role, moduleId, passed, score, critical, date: users[key].updated })
    }).catch(()=>{});
  }
}

/* ================= Roster (Google Sheet) ================= */
function loadRosterCache(){ return JSON.parse(localStorage.getItem("chelas_roster_cache") || "[]"); }
function saveRosterCache(roster){ localStorage.setItem("chelas_roster_cache", JSON.stringify(roster)); }

async function fetchRoster(){
  if(!REPORT_URL) return null;
  try{
    const res = await fetch(REPORT_URL + "?action=roster");
    const data = await res.json();
    if(data && Array.isArray(data.roster)){
      saveRosterCache(data.roster);
      return data.roster;
    }
    return null;
  }catch(err){
    return null;
  }
}

function findInRoster(roster, email){
  const target = email.trim().toLowerCase();
  return roster.find(r => r.email.trim().toLowerCase() === target);
}

function applyStaticTranslations(){
  document.querySelectorAll("[data-t-en]").forEach(el=>{
    const val = el.getAttribute(lang === "en" ? "data-t-en" : "data-t-es");
    if(val) el.textContent = val;
  });
  document.querySelectorAll("[data-t-en-ph]").forEach(el=>{
    const val = el.getAttribute(lang === "en" ? "data-t-en-ph" : "data-t-es-ph");
    if(val) el.placeholder = val;
  });
  $("btn-lang-es").classList.toggle("active", lang === "es");
  $("btn-lang-en").classList.toggle("active", lang === "en");
}

/* ================= Login ================= */
function showLoginError(msg){
  const el = $("login-error");
  el.textContent = msg;
  el.style.display = "block";
}

$("btn-logout").addEventListener("click", () => {
  localStorage.removeItem("chelas_current_user");
  currentUser = null;
  location.reload();
});

/* ================= Tracks / Tabs ================= */
// QA test accounts: full access to every track, every module unlocked, no gating.
// Remove an email here (or the whole list) once QA testing is done.
const QA_TEST_EMAILS = ["freddyb@hotlimekitchen.com"];
function isQAUser(email){
  return !!email && QA_TEST_EMAILS.includes(email.trim().toLowerCase());
}

function getUserTracks(role, email){
  if(role === "Manager" || isQAUser(email)) return ALL_TRACKS.slice();
  const track = ROLE_TRACK[role];
  return ["CORE", track];
}

function getModulesForTrack(track){
  return MODULES.filter(m => m.track === track);
}

function isModulePassed(email, moduleId){
  const rec = getUserRecord(email);
  return !!(rec && rec.progress[moduleId] && rec.progress[moduleId].passed);
}

function isModuleUnlockedInTrack(list, idx, email, track){
  if(isQAUser(email)) return true;
  if(idx === 0) return true;
  return isModulePassed(email, list[idx-1].id);
}

function trackProgress(track, email){
  const list = getModulesForTrack(track);
  const passed = list.filter(m => isModulePassed(email, m.id)).length;
  return { passed, total: list.length };
}

function renderTabs(){
  const tabsEl = $("track-tabs");
  tabsEl.innerHTML = "";
  tabsEl.classList.remove("hidden");
  userTracks.forEach(track => {
    const { passed, total } = trackProgress(track, currentUser.email);
    const b = document.createElement("button");
    b.className = track === activeTrack ? "active" : "";
    b.innerHTML = `${t(TRACK_LABEL[track])} <span class="cnt">${passed}/${total}</span>`;
    b.addEventListener("click", () => {
      activeTrack = track;
      activeFilter = "Todos";
      searchQuery = "";
      $("search-input").value = "";
      renderTabs();
      renderFilters();
      renderModuleList();
    });
    tabsEl.appendChild(b);
  });
}

function renderFilters(){
  const list = getModulesForTrack(activeTrack);
  const cats = Array.from(new Set(list.map(m => m.category)));
  const pillsEl = $("filter-pills");
  pillsEl.innerHTML = "";
  const allBtn = document.createElement("button");
  allBtn.className = "filter-pill" + (activeFilter === "Todos" ? " active" : "");
  allBtn.textContent = lang === "es" ? "Todos" : "All";
  allBtn.addEventListener("click", () => { activeFilter = "Todos"; renderFilters(); renderModuleList(); });
  pillsEl.appendChild(allBtn);
  cats.forEach(cat => {
    const b = document.createElement("button");
    b.className = "filter-pill" + (activeFilter === cat ? " active" : "");
    b.textContent = cat;
    b.addEventListener("click", () => { activeFilter = cat; renderFilters(); renderModuleList(); });
    pillsEl.appendChild(b);
  });
}

/* ================= Dashboard ================= */
function showDashboard(){
  $("view-login").classList.add("hidden");
  $("view-module").classList.add("hidden");
  $("view-admin").classList.add("hidden");
  $("view-onboarding").classList.add("hidden");
  $("view-dashboard").classList.remove("hidden");
  $("btn-logout").classList.remove("hidden");
  $("header-username").classList.remove("hidden");
  $("header-username").textContent = currentUser.name;
  $("btn-go-admin").classList.toggle("hidden", currentUser.role !== "Manager");
  $("btn-go-onboarding").classList.toggle("hidden", currentUser.role !== "Manager");

  userTracks = getUserTracks(currentUser.role, currentUser.email);
  if(!userTracks.includes(activeTrack)) activeTrack = userTracks[0];

  $("dash-name").textContent = currentUser.name;
  $("dash-role").textContent = currentUser.role;

  const allUserModules = userTracks.flatMap(getModulesForTrack);
  const passedTotal = allUserModules.filter(m => isModulePassed(currentUser.email, m.id)).length;
  const pct = allUserModules.length ? Math.round((passedTotal / allUserModules.length) * 100) : 0;
  const ring = $("progress-ring");
  ring.style.background = `conic-gradient(var(--accent) ${pct*3.6}deg, #eee 0deg)`;
  ring.textContent = pct + "%";

  renderTabs();
  renderFilters();
  renderModuleList();
}

function renderModuleList(){
  const list = getModulesForTrack(activeTrack);
  const { passed, total } = trackProgress(activeTrack, currentUser.email);
  const summaryEl = $("track-summary");
  summaryEl.textContent = `${t(TRACK_LABEL[activeTrack])} — ${lang==="es" ? `${passed} de ${total} módulos completados en esta sección` : `${passed} of ${total} modules completed in this section`}`;

  const q = ($("search-input").value || "").trim().toLowerCase();
  searchQuery = q;

  const listEl = $("module-list");
  listEl.innerHTML = "";
  list.forEach((m, idx) => {
    if(activeFilter !== "Todos" && m.category !== activeFilter) return;
    if(searchQuery && !t(m.title).toLowerCase().includes(searchQuery)) return;

    const unlocked = isModuleUnlockedInTrack(list, idx, currentUser.email, activeTrack);
    const passedMod = isModulePassed(currentUser.email, m.id);
    const rec = getUserRecord(currentUser.email);
    const scoreInfo = rec && rec.progress[m.id] ? rec.progress[m.id].score : null;
    const lockedLabel = lang==="es" ? "Bloqueado — aprueba el anterior" : "Locked — pass the previous one";
    const pendingLabel = m.policyOnly
      ? (lang==="es" ? "Confirma que leíste las políticas" : "Confirm you've read the policies")
      : (lang==="es" ? `${m.pass}% para aprobar` : `${m.pass}% to pass`);
    const passedLabel = m.policyOnly
      ? (lang==="es" ? "Confirmado" : "Confirmed")
      : (lang==="es" ? `Aprobado — ${scoreInfo}%` : `Passed — ${scoreInfo}%`);

    const row = document.createElement("div");
    row.className = "module-card" + (unlocked ? "" : " locked");
    row.innerHTML = `
      <div class="icon ${passedMod ? "done" : (unlocked ? "open" : "locked")}">${passedMod ? "✓" : (unlocked ? "▶" : "🔒")}</div>
      <div class="info">
        <div class="idline"><span class="cat-badge ${m.category}">${m.category}</span></div>
        <div class="t">${m.id} — ${t(m.title)} ${m.critical ? `<span class="pill crit">${lang==="es"?"Crítico":"Critical"}</span>` : ""}</div>
        <div class="s">${passedMod ? passedLabel : (unlocked ? pendingLabel : lockedLabel)}</div>
      </div>`;
    if(unlocked){
      row.addEventListener("click", () => openModule(m));
    }
    listEl.appendChild(row);
  });
}

$("search-input").addEventListener("input", renderModuleList);

/* ================= Module: lessons -> flashcards -> quiz ================= */
function openModule(m){
  activeModule = m;
  lessonIdx = 0; flashIdx = 0; quizAnswers = {};
  $("view-dashboard").classList.add("hidden");
  $("view-admin").classList.add("hidden");
  $("view-module").classList.remove("hidden");
  $("track-tabs").classList.add("hidden");
  $("mod-title").textContent = t(m.title);
  $("mod-lessons").classList.remove("hidden");
  $("mod-flash").classList.add("hidden");
  $("mod-quiz").classList.add("hidden");
  $("mod-policy").classList.add("hidden");
  $("policy-checkbox").checked = false;
  $("btn-policy-confirm").disabled = true;
  $("policy-result").classList.add("hidden");
  $("btn-policy-confirm").classList.remove("hidden");
  renderLesson();
}

function renderLesson(){
  const m = activeModule;
  $("lesson-text").textContent = t(m.lessons[lessonIdx]);
  const dots = $("lesson-dots");
  dots.innerHTML = "";
  m.lessons.forEach((_, i) => {
    const d = document.createElement("span");
    if(i === lessonIdx) d.className = "active";
    dots.appendChild(d);
  });
  $("btn-lesson-prev").disabled = lessonIdx === 0;
  const isLast = lessonIdx === m.lessons.length - 1;
  $("btn-lesson-next").textContent = isLast
    ? (m.policyOnly
        ? (lang==="es" ? "Continuar" : "Continue")
        : (lang==="es" ? (m.flashcards && m.flashcards.length ? "Tarjetas" : "Ir al examen") : (m.flashcards && m.flashcards.length ? "Flashcards" : "Take the quiz")))
    : (lang==="es" ? "Siguiente" : "Next");
}
$("btn-lesson-prev").addEventListener("click", () => { if(lessonIdx>0){ lessonIdx--; renderLesson(); } });
$("btn-lesson-next").addEventListener("click", () => {
  const m = activeModule;
  if(lessonIdx < m.lessons.length - 1){ lessonIdx++; renderLesson(); return; }
  $("mod-lessons").classList.add("hidden");
  if(m.policyOnly){
    $("mod-policy").classList.remove("hidden");
    return;
  }
  if(m.flashcards && m.flashcards.length){
    $("mod-flash").classList.remove("hidden");
    renderFlash();
  } else {
    startQuiz();
  }
});

function renderFlash(){
  const m = activeModule;
  const f = m.flashcards[flashIdx];
  const inner = $("flash-inner");

  // Reset flip without visible transition
  inner.style.transition = "none";
  inner.classList.remove("flipped");
  void inner.offsetWidth; // force reflow
  inner.style.transition = "";

  // Front face — image + name
  $("flash-front").innerHTML = f.img
    ? `<img src="${f.img}" alt="${t(f.front)}" class="flash-img"><div class="flash-label">${t(f.front)}</div>`
    : `<div class="flash-label" style="font-size:21px">${t(f.front)}</div>`;

  // Back face — ingredients / details
  $("flash-back").innerHTML = `<div class="flash-label" style="font-size:14.5px;font-weight:600;line-height:1.6">${t(f.back)}</div>`;

  // Counter
  $("flash-counter").textContent = lang === "es"
    ? `Tarjeta ${flashIdx + 1} de ${m.flashcards.length}`
    : `Card ${flashIdx + 1} of ${m.flashcards.length}`;

  // Hint
  $("flash-hint").textContent = lang === "es" ? "Toca para ver los ingredientes" : "Tap to reveal ingredients";

  // Toggle flip on click
  inner.onclick = () => inner.classList.toggle("flipped");

  // Dot indicators
  const dots = $("flash-dots");
  dots.innerHTML = "";
  m.flashcards.forEach((_, i) => {
    const d = document.createElement("span");
    if (i === flashIdx) d.className = "active";
    dots.appendChild(d);
  });

  $("btn-flash-prev").disabled = flashIdx === 0;
  const isLast = flashIdx === m.flashcards.length - 1;
  $("btn-flash-next").textContent = isLast
    ? (lang === "es" ? "Ir al examen" : "Take the quiz")
    : (lang === "es" ? "Siguiente" : "Next");
}
$("btn-flash-prev").addEventListener("click", () => { if(flashIdx>0){ flashIdx--; renderFlash(); } });
$("btn-flash-next").addEventListener("click", () => {
  const m = activeModule;
  if(flashIdx < m.flashcards.length - 1){ flashIdx++; renderFlash(); return; }
  $("mod-flash").classList.add("hidden");
  startQuiz();
});

function shuffleArray(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let quizOptionOrder = [];

function startQuiz(){
  const m = activeModule;
  $("mod-quiz").classList.remove("hidden");
  $("quiz-result").classList.add("hidden");
  $("btn-quiz-submit").classList.remove("hidden");
  $("quiz-pass-note").textContent = (lang==="es"
    ? `Necesitas ${m.pass}% para aprobar.` + (m.critical ? " Este módulo es crítico y requiere 100%." : "")
    : `You need ${m.pass}% to pass.` + (m.critical ? " This is a critical module requiring 100%." : ""));
  quizAnswers = {};
  quizOptionOrder = m.quiz.map(q => shuffleArray(q.options.map((_, i) => i)));
  const body = $("quiz-body");
  body.innerHTML = "";
  m.quiz.forEach((q, qi) => {
    const block = document.createElement("div");
    block.className = "q-block";
    block.innerHTML = `<div class="q-title">${qi+1}. ${t(q.q)}</div>`;
    quizOptionOrder[qi].forEach((realIdx) => {
      const opt = q.options[realIdx];
      const b = document.createElement("button");
      b.type = "button";
      b.className = "opt";
      b.textContent = t(opt);
      b.addEventListener("click", () => {
        quizAnswers[qi] = realIdx;
        block.querySelectorAll(".opt").forEach(x => x.classList.remove("selected"));
        b.classList.add("selected");
      });
      block.appendChild(b);
    });
    body.appendChild(block);
  });
}

$("btn-quiz-submit").addEventListener("click", () => {
  const m = activeModule;
  if(Object.keys(quizAnswers).length < m.quiz.length){
    alert(lang==="es" ? "Responde todas las preguntas." : "Answer all questions.");
    return;
  }
  let correct = 0;
  const missed = [];
  const blocks = document.querySelectorAll("#quiz-body .q-block");
  m.quiz.forEach((q, qi) => {
    const opts = blocks[qi].querySelectorAll(".opt");
    opts.forEach((o, displayIdx) => {
      const realIdx = quizOptionOrder[qi][displayIdx];
      if(realIdx === q.correct) o.classList.add("correct");
      else if(realIdx === quizAnswers[qi] && realIdx !== q.correct) o.classList.add("wrong");
    });
    if(quizAnswers[qi] === q.correct){
      correct++;
    } else {
      missed.push({ question: t(q.q), answer: t(q.options[q.correct]) });
    }
  });
  const score = Math.round((correct / m.quiz.length) * 100);
  const passed = score >= m.pass;
  saveProgress(currentUser.email, m.id, passed, score, !!m.critical);

  // Build missed-questions HTML
  let missedHtml = "";
  if(missed.length){
    const missedLabel = lang==="es" ? "Preguntas incorrectas" : "Missed questions";
    const correctLabel = lang==="es" ? "Respuesta correcta:" : "Correct answer:";
    missedHtml = `
      <div class="missed-title">${missedLabel}</div>
      <div class="missed-list">
        ${missed.map(m => `
          <div class="missed-item">
            <div class="mi-q">${m.question}</div>
            <div class="mi-a">✓ ${correctLabel} ${m.answer}</div>
          </div>
        `).join("")}
      </div>`;
  }

  const result = $("quiz-result");
  result.classList.remove("hidden");
  result.innerHTML = `
    <div class="quiz-score-ring ${passed ? "passed" : "failed"}">${score}%</div>
    <div style="font-size:17px;font-weight:800;margin-bottom:6px">

function loadOnboarding(){ return JSON.parse(localStorage.getItem("chelas_onboarding") || '{"candidates":[],"progress":{}}'); }
function saveOnboarding(data){ localStorage.setItem("chelas_onboarding", JSON.stringify(data)); }
let onbOpenId = null;

function onbTotalItems(){ return ONBOARDING_PHASES.reduce((n, p) => n + p.items.length, 0); }

function onbCandidateProgress(data, id){
  const prog = data.progress[id] || {};
  let checked = 0;
  ONBOARDING_PHASES.forEach(phase => {
    phase.items.forEach((_, i) => { if(prog[phase.id] && prog[phase.id][i]) checked++; });
  });
  return checked;
}

function renderOnboarding(){
  const data = loadOnboarding();
  const list = $("onb-list");
  list.innerHTML = "";
  const total = onbTotalItems();
  data.candidates.slice().reverse().forEach(c => {
    const checked = onbCandidateProgress(data, c.id);
    const pct = Math.round((checked / total) * 100);
    const wrap = document.createElement("div");
    wrap.className = "onb-candidate" + (onbOpenId === c.id ? " open" : "");

    const head = document.createElement("div");
    head.className = "onb-cand-head";
    head.innerHTML = `
      <div class="info">
        <div class="name">${c.name}</div>
        <div class="meta">${c.role || (lang==="es" ? "Sin rol asignado" : "No role assigned")}</div>
      </div>
      <div class="onb-bar-wrap"><div class="onb-bar" style="width:${pct}%"></div></div>
      <div class="onb-pct">${pct}%</div>
      <button class="onb-remove" title="${lang==="es" ? "Eliminar" : "Remove"}">×</button>
    `;
    head.addEventListener("click", (e) => {
      if(e.target.closest(".onb-remove")) return;
      onbOpenId = onbOpenId === c.id ? null : c.id;
      renderOnboarding();
    });
    head.querySelector(".onb-remove").addEventListener("click", () => {
      const d = loadOnboarding();
      d.candidates = d.candidates.filter(x => x.id !== c.id);
      delete d.progress[c.id];
      saveOnboarding(d);
      renderOnboarding();
    });
    wrap.appendChild(head);

    const phasesEl = document.createElement("div");
    phasesEl.className = "onb-phases";
    ONBOARDING_PHASES.forEach(phase => {
      const phaseEl = document.createElement("div");
      phaseEl.className = "onb-phase";
      const titleEl = document.createElement("div");
      titleEl.className = "onb-phase-title";
      titleEl.textContent = t(phase.title);
      phaseEl.appendChild(titleEl);
      phase.items.forEach((item, i) => {
        const isChecked = !!(data.progress[c.id] && data.progress[c.id][phase.id] && data.progress[c.id][phase.id][i]);
        const row = document.createElement("label");
        row.className = "onb-item" + (isChecked ? " checked" : "");
        row.innerHTML = `<input type="checkbox" ${isChecked ? "checked" : ""}><span>${t(item)}</span>`;
        row.querySelector("input").addEventListener("change", (e) => {
          const d = loadOnboarding();
          d.progress[c.id] = d.progress[c.id] || {};
          d.progress[c.id][phase.id] = d.progress[c.id][phase.id] || {};
          d.progress[c.id][phase.id][i] = e.target.checked;
          saveOnboarding(d);
          renderOnboarding();
        });
        phaseEl.appendChild(row);
      });
      phasesEl.appendChild(phaseEl);
    });
    wrap.appendChild(phasesEl);

    list.appendChild(wrap);
  });
}

// ── TAB: Progreso ──
async function loadAdminProgress() {
  const panel = $("admin-panel-progress");
  panel.innerHTML = `<p class="muted center" style="padding:28px 0">Cargando datos del equipo…</p>`;
  try {
    const [progRes, rosterRes] = await Promise.all([
      fetch(REPORT_URL + "?action=allProgress"),
      fetch(REPORT_URL + "?action=roster")
    ]);
    const { progress = [] } = await progRes.json();
    const { roster   = [] } = await rosterRes.json();

    // Agregar por usuario: email -> { name, role, modules{}, lastActive }
    const umap = {};
    roster.forEach(r => {
      umap[r.email] = { name: r.name, role: r.role, modules: {}, lastActive: null };
    });
    progress.forEach(p => {
      if (!umap[p.email]) umap[p.email] = { name: p.name, role: p.role, modules: {}, lastActive: null };
      const ex = umap[p.email].modules[p.moduleId];
      const ts = new Date(p.date || p.timestamp).getTime();
      if (!ex || ts > new Date(ex._ts || 0).getTime())
        umap[p.email].modules[p.moduleId] = { passed: p.passed, score: p.score, _ts: ts };
      if (!umap[p.email].lastActive || ts > new Date(umap[p.email].lastActive).getTime())
        umap[p.email].lastActive = p.date || p.timestamp;
    });

    const entries = Object.entries(umap);
    const stats = entries.map(([email, u]) => {
      const tracks   = getUserTracks(u.role, email);
      const allMods  = tracks.flatMap(getModulesForTrack);
      const passed   = allMods.filter(m => u.modules[m.id] && u.modules[m.id].passed).length;
      const critMods = allMods.filter(m => m.critical);
      const critOk   = critMods.length > 0 && critMods.every(m => u.modules[m.id] && u.modules[m.id].passed);
      const pct      = allMods.length ? Math.round((passed / allMods.length) * 100) : 0;
      return { email, name: u.name, role: u.role, passed, total: allMods.length, pct, critOk, critTotal: critMods.length, lastActive: u.lastActive };
    }).sort((a, b) => b.pct - a.pct);

    const initiated   = stats.filter(u => Object.keys(umap[u.email].modules).length > 0).length;
    const completed   = stats.filter(u => u.pct === 100).length;
    const avgPct      = stats.length ? Math.round(stats.reduce((s, u) => s + u.pct, 0) / stats.length) : 0;

    let html = `
      <div class="stat-grid">
        <div class="stat-box"><div class="sv">${entries.length}</div><div class="sl">En Roster</div></div>
        <div class="stat-box"><div class="sv">${initiated}</div><div class="sl">Iniciaron</div></div>
        <div class="stat-box"><div class="sv">${completed}</div><div class="sl">Completaron</div></div>
        <div class="stat-box"><div class="sv">${avgPct}%</div><div class="sl">Promedio</div></div>
      </div>
      <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>Nombre</th>
          <th>Rol</th>
          <th>Progreso</th>
          <th style="text-align:center">Críticos</th>
          <th>Última actividad</th>
        </tr></thead>
        <tbody>`;

    stats.forEach(u => {
      const color    = u.pct === 100 ? "var(--good)" : u.pct >= 50 ? "var(--header)" : "var(--muted)";
      const critBadge = u.critTotal === 0 ? "<span style='color:var(--muted)'>—</span>"
                      : u.critOk ? "<span style='color:var(--good);font-size:15px'>✅</span>"
                                 : "<span style='color:var(--bad);font-size:15px'>❌</span>";
      const lastDate  = u.lastActive
        ? new Date(u.lastActive).toLocaleDateString("es-US", { month: "short", day: "numeric" }) : "—";
      html += `<tr>
        <td style="font-weight:700">${u.name}<br><span style="font-size:11px;color:var(--muted);font-weight:400">${u.email}</span></td>
        <td><span class="role-tag">${u.role}</span></td>
        <td>
          <span class="prog-bar-wrap"><span class="prog-bar" style="width:${u.pct}%"></span></span>
          <span style="font-size:12px;font-weight:700;color:${color}">${u.pct}%</span>
          <span style="font-size:11px;color:var(--muted)"> (${u.passed}/${u.total})</span>
        </td>
        <td style="text-align:center">${critBadge}</td>
        <td style="font-size:12px;color:var(--muted)">${lastDate}</td>
      </tr>`;
    });

    html += `</tbody></table></div>`;
    panel.innerHTML = html;

  } catch (err) {
    panel.innerHTML = `<p style="color:var(--bad);text-align:center;padding:20px 0">Error cargando datos. Verifica la conexión con Google Sheets.</p>`;
  }
}

            <button class="btn secondary small" onclick="togglePinForm('${safeId}')">Cambiar PIN</button>
          </div>

          <!-- PIN change form (hidden) -->
          <div class="pin-change-form hidden" id="pinform-${safeId}">
            <input type="text" id="epin-${safeId}" placeholder="Nuevo PIN" maxlength="4"
                   inputmode="numeric" style="max-width:110px;text-align:center;font-family:monospace;letter-spacing:3px;font-size:15px;padding:6px 10px;border-radius:8px;border:1px solid var(--border)">
            <button class="btn small" onclick="savePinEdit('${u.email}','${safeId}')">Guardar</button>
            <button class="btn secondary small" onclick="closePinForm('${safeId}')">✕</button>
          </div>

          <!-- Edit form (hidden) -->
          <div class="edit-inline" id="edit-${safeId}">
            <div class="form-row">
              <input type="text"  id="ename-${safeId}"  value="${u.name}">
              <select id="erole-${safeId}">
                ${VALID_ROLES.map(r => `<option value="${r}"${r===u.role?" selected":""}>${r}</option>`).join("")}
              </select>
            </div>
            <div style="display:flex;gap:6px">
              <button class="btn small" onclick="saveRosterEdit('${u.email}','${safeId}')">Guardar</button>
              <button class="btn secondary small" onclick="closeEditForm('${safeId}')">Cancelar</button>
            </div>
          </div>

          <!-- Delete confirm (hidden) -->
          <div class="del-confirm" id="delconf-${safeId}">
            <span>¿Eliminar a <strong>${u.name}</strong>?</span>
            <div style="display:flex;gap:6px">
              <button class="btn small" style="background:var(--bad);color:#fff" onclick="confirmDeleteRoster('${u.email}','${safeId}')">Sí, eliminar</button>
              <button class="btn secondary small" onclick="closeDelConfirm('${safeId}')">No</button>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0;padding-top:2px">
          <button class="btn secondary small" onclick="toggleEditForm('${safeId}')">✏️</button>
          <button class="btn small" style="background:var(--bad);color:#fff" onclick="showDelConfirm('${safeId}')">×</button>
        </div>
      </div>`;
  });

  html += `</div>`;
  panel.innerHTML = html;
  $("btn-roster-add").addEventListener("click", addRosterUser);
}

// Helpers edit/delete
function toggleEditForm(safeId) {
  const f = $("edit-" + safeId);
  f.classList.toggle("show");
  $("delconf-" + safeId).classList.remove("show");
}
function closeEditForm(safeId) { $("edit-" + safeId).classList.remove("show"); }
function showDelConfirm(safeId) {
  $("delconf-" + safeId).classList.add("show");
  $("edit-" + safeId).classList.remove("show");
}
function closeDelConfirm(safeId) { $("delconf-" + safeId).classList.remove("show"); }

// PIN forms
function togglePinForm(safeId) {
  const f = $("pinform-" + safeId);
  f.classList.toggle("hidden");
  if (!f.classList.contains("hidden")) $("epin-" + safeId).focus();
  $("edit-" + safeId).classList.remove("show");
  $("delconf-" + safeId).classList.remove("show");
}
function closePinForm(safeId) { $("pinform-" + safeId).classList.add("hidden"); }

async function savePinEdit(email, safeId) {
  const newPin = $("epin-" + safeId).value.trim();
  if (!newPin) return;
  const entry = adminRosterData.find(r => r.email === email);
  if (!entry) return;
  // Update in Sheets (preserve name/role, update pin)
  fetch(REPORT_URL, {
    method: "POST", mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "updateRoster", oldEmail: email, email: email, name: entry.name, role: entry.role, pin: newPin })
  }).catch(() => {});
  entry.pin = newPin;
  saveRosterCache(adminRosterData);
  closePinForm(safeId);
  renderRosterPanel();
}

async function saveRosterEdit(email, safeId) {
  const newName = $("ename-" + safeId).value.trim();
  const newRole = $("erole-" + safeId).value;
  if (!newName || !newRole) return;
  const entry = adminRosterData.find(r => r.email === email);
  const existingPin = entry ? (entry.pin || "") : "";
  fetch(REPORT_URL, {
    method:"POST", mode:"no-cors",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ action:"updateRoster", oldEmail:email, email:email, name:newName, role:newRole, pin:existingPin })
  }).catch(()=>{});
  if (entry) { entry.name = newName; entry.role = newRole; }
  saveRosterCache(adminRosterData);
  renderRosterPanel();
}

async function confirmDeleteRoster(email, safeId) {
  fetch(REPORT_URL, {
    method:"POST", mode:"no-cors",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ action:"removeRoster", email })
  }).catch(()=>{});
  adminRosterData = adminRosterData.filter(r => r.email !== email);
  saveRosterCache(adminRosterData);
  renderRosterPanel();
}

async function addRosterUser() {
  const email = $("new-user-email").value.trim().toLowerCase();
  const name  = $("new-user-name").value.trim();
  const role  = $("new-user-role").value;
  const msg   = $("roster-add-msg");
  const btn   = $("btn-roster-add");

  msg.style.display = "none";
  if (!email || !name || !role) {
    msg.style.display = "block"; msg.style.color = "var(--bad)";
    msg.textContent = "Completa todos los campos."; return;
  }
  if (adminRosterData.find(r => r.email === email)) {
    msg.style.display = "block"; msg.style.color = "var(--bad)";
    msg.textContent = "Este correo ya está en el roster."; return;
  }
  const pin = ($("new-user-pin") ? $("new-user-pin").value.trim() : "");
  btn.disabled = true; btn.textContent = "Guardando…";
  fetch(REPORT_URL, {
    method:"POST", mode:"no-cors",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ action:"addRoster", email, name, role, pin })
  }).catch(()=>{});
  adminRosterData.push({ email, name, role, pin });
  saveRosterCache(adminRosterData);
  msg.style.display = "block"; msg.style.color = "var(--good)";
  msg.textContent = `✓ ${name} agregado como ${role}`;
  $("new-user-email").value = "";
  $("new-user-name").value  = "";
  $("new-user-role").value  = "";
  if ($("new-user-pin")) $("new-user-pin").value = "";
  btn.disabled = false; btn.textContent = "Agregar";
  renderRosterPanel();
  $("roster-add-msg").style.display = "block";
  $("roster-add-msg").style.color   = "var(--good)";
  $("roster-add-msg").textContent   = `✓ ${name} agregado como ${role}`;
}

/* ── TAB: Config ── */
function renderConfigPanel() {
  const panel = $("admin-panel-config");
  const currentPin = getAdminPin();
  panel.innerHTML = `
    <div style="max-width:360px">
      <h3 style="margin:0 0 6px;color:var(--header)">🔐 PIN del Admin</h3>
      <p style="margin:0 0 16px;font-size:13.5px;color:var(--muted)">
        PIN actual: <span style="font-family:monospace;font-weight:700;font-size:15px;color:var(--text)">
          ${"•".repeat(currentPin.length)}</span>
      </p>
      <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:6px">Nuevo PIN (4 dígitos)</label>
      <input type="password" id="cfg-pin-new" class="pin-field" placeholder="••••" maxlength="4"
             inputmode="numeric" autocomplete="off" style="max-width:180px;margin-bottom:10px">
      <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:6px">Confirmar PIN</label>
      <input type="password" id="cfg-pin-confirm" class="pin-field" placeholder="••••" maxlength="4"
             inputmode="numeric" autocomplete="off" style="max-width:180px;margin-bottom:14px">
      <p id="cfg-pin-msg" style="display:none;font-size:13px;margin:0 0 12px"></p>
      <button class="btn" id="btn-cfg-save-pin">Guardar nuevo PIN</button>
    </div>`;
  $("btn-cfg-save-pin").addEventListener("click", () => {
    const n = $("cfg-pin-new").value.trim();
    const c = $("cfg-pin-confirm").value.trim();
    const msg = $("cfg-pin-msg");
    msg.style.display = "none";
    if (!n || n.length < 4) {
      msg.style.color = "var(--bad)"; msg.style.display = "block";
      msg.textContent = "El PIN debe tener al menos 4 caracteres."; return;
    }
    if (n !== c) {
      msg.style.color = "var(--bad)"; msg.style.display = "block";
      msg.textContent = "Los PINs no coinciden."; return;
    }
    setAdminPin(n);
    $("cfg-pin-new").value = ""; $("cfg-pin-confirm").value = "";
    msg.style.color = "var(--good)"; msg.style.display = "block";
    msg.textContent = "✓ PIN actualizado correctamente.";
    renderConfigPanel();
  });
}

/* ================= Login con PIN ================= */
let pendingLoginEntry = null; // guarda el entry del roster mientras el usuario escribe el PIN

$("btn-login").addEventListener("click", async () => {
  const email = $("login-email").value.trim().toLowerCase();
  $("login-error").style.display = "none";
  if (!email) { showLoginError(lang === "es" ? "Escribe tu correo" : "Enter your email"); return; }

  if (!REPORT_URL) {
    showLoginError(lang === "es"
      ? "Configuración pendiente: el administrador debe conectar el Google Sheet primero (ver README)."
      : "Setup pending: the admin needs to connect the Google Sheet first (see README).");
    return;
  }

  $("btn-login").disabled = true;
  let roster = await fetchRoster();
  if (!roster) roster = loadRosterCache();
  $("btn-login").disabled = false;

  if (!roster || !roster.length) {
    showLoginError(lang === "es"
      ? "No se pudo conectar con la lista de acceso. Intenta de nuevo o avisa a tu manager."
      : "Couldn't reach the access list. Try again or tell your manager.");
    return;
  }

  const entry = findInRoster(roster, email);
  if (!entry) {
    showLoginError(lang === "es"
      ? "Tu correo no está registrado. Pide a tu manager que te agregue en el Google Sheet."
      : "Your email isn't registered. Ask your manager to add you to the Google Sheet.");
    return;
  }

  const normalizedRole = normalizeRole(entry.role);
  if (!normalizedRole) {
    showLoginError(lang === "es"
      ? `El rol "${entry.role}" en el Roster no es válido. Pide a tu manager que lo corrija a uno de: Server, Bartender, Busser, Host, Manager.`
      : `The role "${entry.role}" in the Roster isn't valid. Ask your manager to fix it to one of: Server, Bartender, Busser, Host, Manager.`);
    return;
  }

  // Si el usuario tiene PIN asignado, pedirlo; si no, entrar directo
  if (entry.pin && entry.pin.length >= 1) {
    pendingLoginEntry = entry;
    $("login-email").closest(".card").querySelector("button#btn-login").style.display = "none";
    $("login-pin-step").classList.remove("hidden");
    $("login-pin-error").style.display = "none";
    $("login-pin").value = "";
    setTimeout(() => $("login-pin").focus(), 80);
  } else {
    completeLogin(entry);
  }
});

$("btn-login-pin").addEventListener("click", verifyStaffPin);
$("login-pin").addEventListener("keydown", e => { if (e.key === "Enter") verifyStaffPin(); });

function verifyStaffPin() {
  const pin = $("login-pin").value.trim();
  if (!pendingLoginEntry) return;
  if (pin === String(pendingLoginEntry.pin)) {
    completeLogin(pendingLoginEntry);
  } else {
    $("login-pin-error").style.display = "block";
    $("login-pin").value = "";
    $("login-pin").focus();
  }
}

$("btn-login-back").addEventListener("click", () => {
  $("login-pin-step").classList.add("hidden");
  $("btn-login").style.display = "";
  $("login-pin-error").style.display = "none";
  pendingLoginEntry = null;
});

function completeLogin(entry) {
  const normalizedRole = normalizeRole(entry.role);
  const rec = upsertUserRecord(entry.email, entry.name, normalizedRole);
  currentUser = { email: rec.email, name: rec.name, role: rec.role };
  localStorage.setItem("chelas_current_user", JSON.stringify(currentUser));
  // Resetear estado del login
  $("login-pin-step").classList.add("hidden");
  $("btn-login").style.display = "";
  pendingLoginEntry = null;
  showDashboard();
}

/* ================= Language ================= */
function setLang(l){
  lang = l;
  localStorage.setItem("chelas_lang", l);
  applyStaticTranslations();
  if(!$("view-dashboard").classList.contains("hidden")) showDashboard();
  if(!$("view-module").classList.contains("hidden") && activeModule) openModule(activeModule);
  if(!$("view-admin").classList.contains("hidden")) renderAdmin();
  if(!$("view-onboarding").classList.contains("hidden")) renderOnboarding();
}
$("btn-lang-es").addEventListener("click", () => setLang("es"));
$("btn-lang-en").addEventListener("click", () => setLang("en"));

/* ================= Boot ================= */
async function refreshCurrentUserFromRoster(){
  if(!currentUser || !REPORT_URL) return;
  const roster = await fetchRoster();
  if(!roster) return;
  const entry = findInRoster(roster, currentUser.email);
  if(!entry) return; // stay logged in with cached role if they were since removed; login screen will catch it next fresh login
  const normalizedRole = normalizeRole(entry.role);
  if(!normalizedRole) return; // invalid role in the sheet; keep the last known-good role until it's fixed
  if(entry.name !== currentUser.name || normalizedRole !== currentUser.role){
    const rec = upsertUserRecord(entry.email, entry.name, normalizedRole);
    currentUser = { email: rec.email, name: rec.name, role: rec.role };
    localStorage.setItem("chelas_current_user", JSON.stringify(currentUser));
    if(!$("view-dashboard").classList.contains("hidden")) showDashboard();
    if(!$("view-admin").classList.contains("hidden")) renderAdmin();
  }
}

applyStaticTranslations();
const saved = JSON.parse(localStorage.getItem("chelas_current_user") || "null");
if(saved){
  currentUser = saved;
  showDashboard();
  refreshCurrentUserFromRoster();
} else {
  $("view-login").classList.remove("hidden");
}
</script>
